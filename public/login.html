<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — SAHYOG</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">SAHYOG</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="explore.html">Explore NGOs</a>
      <a href="login.html">Login</a>
      <a href="signup.html">Signup</a>
    </div>
  </nav>

  <!-- Login Form -->
  <section class="form-section">
    <div class="form-card">
      <h2>Login</h2>
      <p class="form-subtitle">Welcome back!</p>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter your email">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password">
      </div>

      <button class="btn-full" onclick="login()">Login</button>

      <p class="form-footer">
        Don't have an account? <a href="signup.html">Signup here</a>
      </p>

      <p id="message" class="message"></p>
    </div>
  </section>

  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
